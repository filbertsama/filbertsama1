  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
#    user: root
#    environment:
#      - TZ=Asia/Shanghai
    ports:
      - 9090:9090
    volumes:
      - /opt/prod/prometheus.yml:/etc/prometheus/prometheus.yml:ro
#      - /opt/module/my-docker-compose/rules.yml:/opt/bitnami/prometheus/conf/rules.yml:ro
